services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: fulfillflow
      POSTGRES_USER: fulfillflow
      POSTGRES_PASSWORD: fulfillflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fulfillflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
