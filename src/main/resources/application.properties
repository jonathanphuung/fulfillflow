spring.application.name=fulfillflow
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/fulfillflow}
spring.datasource.username=${DATABASE_USER:fulfillflow}
spring.datasource.password=${DATABASE_PASSWORD:fulfillflow}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:fulfillflow}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:fulfillflow}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.default-requeue-rejected=false

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis
spring.cache.redis.time-to-live=5m
